# fly.toml app configuration file for drb99
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'drb99'
primary_region = 'iad'

[build]
  [build.args]
    GO_VERSION = '1.26.1'

[env]
  DRB99 = ':8080'
  DRB99_CORS_ORIGINS = '*'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = '10s'
    interval = '30s'
    method = 'GET'
    timeout = '5s'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
